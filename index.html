<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!--
      Security hardening (Bloco 3). Conservative, app-compatible policy.
      - CSP locks script execution to our own bundle while still allowing the
        styles/fonts/images/realtime endpoints the app legitimately uses.
      - frame-ancestors is intentionally NOT restricted here so the Lovable
        editor preview (which embeds the app in an iframe) keeps working.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: wss: ws://localhost:* http://localhost:*; worker-src 'self' blob:; frame-src 'self'; form-action 'self';"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="title" content="Portal Casa Espírita — Gestão para casas espíritas" />
    <title>Portal Casa Espírita — Gestão para casas espíritas</title>
    <meta name="description" content="Portal Casa Espírita — plataforma de gestão espiritual, assistencial e administrativa para casas espíritas. Uma plataforma SC Moreira Tech.">
    <meta name="author" content="SC Moreira Tech" />


    <!-- PWA / mobile app -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#33938a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Portal Casa Espírita" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
